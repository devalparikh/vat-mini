seed: 3
output_dir: runs/smoke
# Tiny transformer kernels are faster on CPU than paying MPS dispatch overhead.
device: cpu
data:
  train_samples: 128
  validation_samples: 32
  sequence_length: 6
  image_size: 16
  grid_size: 4
  batch_size: 4
  num_workers: 0
  action_noise: 0.0
model:
  num_actions: 5
  vision_width: 8
  embedding_dim: 32
  transformer_layers: 1
  attention_heads: 2
  feedforward_dim: 64
  dropout: 0.0
  max_sequence_length: 8
training:
  stage: pretrain
  epochs: 8
  learning_rate: 0.001
  weight_decay: 0.0
  gradient_clip_norm: 1.0
  log_every_steps: 32
  checkpoint_every_epochs: 1
  advantage_temperature: 1.0
  maximum_advantage_weight: 10.0
  initial_checkpoint: null
tracking:
  enabled: false
  project: vat-mini
  entity: null
  mode: offline
  run_name: null
  rollout_every_epochs: 1
