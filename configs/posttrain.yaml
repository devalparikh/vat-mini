seed: 11
output_dir: runs/posttrain
device: auto
data:
  dataset_path: data/gridworld-posttrain.npz
  train_samples: 1024
  validation_samples: 128
  sequence_length: 12
  image_size: 32
  grid_size: 8
  batch_size: 32
  num_workers: 0
  action_noise: 0.25
model:
  num_actions: 5
  vision_width: 32
  embedding_dim: 96
  transformer_layers: 2
  attention_heads: 4
  feedforward_dim: 192
  dropout: 0.1
  max_sequence_length: 32
training:
  stage: posttrain
  epochs: 4
  learning_rate: 0.0001
  weight_decay: 0.01
  gradient_clip_norm: 1.0
  log_every_steps: 20
  checkpoint_every_epochs: 1
  advantage_temperature: 0.5
  maximum_advantage_weight: 20.0
  initial_checkpoint: runs/pretrain/latest.pt
tracking:
  enabled: false
  project: vat-mini
  entity: null
  mode: online
  run_name: null
  rollout_every_epochs: 1
